[build]
command = "react-router build"
publish = "build/client"

[dev]
command = "react-router dev"

# Catch-all redirect for SPA routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = '''
    max-age=31536000,
    immutable
    '''